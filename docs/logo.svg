  <path d="M32 42v28c0 5.5 12.5 10 28 10s28-4.5 28-10V42" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
  <ellipse cx="60" cy="70" rx="28" ry="10" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.3"/>
